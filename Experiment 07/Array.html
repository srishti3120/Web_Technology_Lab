<!DOCTYPE html>
<fieldset style="border: 5px solid powderblue;"> 
<legend> Registration Form </legend>
<link rel="stylesheet" href="Array.css"/>
<form>
    <label> Full Name* </label><br>
    <input type="text" id="name" placeholder="John Doe" required/>
    <br><br><br>

    <label> Email* </label><br>
    <input type="email" id="email" placeholder="john@example.com" required/>
    <br><br><br>

    <label> Date of Birth </label><br>
    <input type="date" id="dob"/>
    <br><br><br>

    <label>Hobbies:</label><br>
    <input type="checkbox" name="hobby" value="Reading"> Reading
    <input type="checkbox" name="hobby" value="Sports"> Sports
    <input type="checkbox" name="hobby" value="Music"> Music
    <input type="checkbox" name="hobby" value="Movies"> Movies
    <input type="checkbox" name="hobby" value="Travel"> Travel
    <input type="checkbox" name="hobby" value="Writing"> Writing
    <br><br><br>

    <label> Gender </label><br>
    <input type="radio" name="gender" value="Male"> Male
    <input type="radio" name="gender" value="Female"> Female
    <input type="radio" name="gender" value="Other"> Other
    <br><br><br>

    <input type="checkbox"/> I agree to terms* 
    <br><br><br>

    <button type="button" onclick="printForm()">Submit</button>
    <button type="reset">Reset</button>
</form>
</fieldset>

<h3>Output:</h3>
<div id="output" style="border: 5px solid powderblue; padding: 15px; margin-top: 20px; width: fit-content; min-width: 300px;"></div>

<script>
let formDataArray = [];   // Global array to store all submissions

function printForm() {

  let name = document.getElementById("name").value;
  let email = document.getElementById("email").value;
  let dob = document.getElementById("dob").value;

  // Get gender
  let gender = "";
  let genders = document.getElementsByName("gender");
  for (let g of genders) {
    if (g.checked) {
      gender = g.value;
    }
  }

  // Get hobbies
  let hobbies = [];
  let hobbyList = document.getElementsByName("hobby");
  for (let h of hobbyList) {
    if (h.checked) {
      hobbies.push(h.value);
    }
  }

  // Create object
  let user = {
    name: name,
    email: email,
    dob: dob,
    gender: gender,
    hobbies: hobbies.join(", ")
  };

  // Store in array
  formDataArray.push(user);

  // Update table
  displayTable();
}

function displayTable() {

  let tableHTML = `
  <table border="1" cellpadding="8">
    <tr>
      <th>Name</th>
      <th>Email</th>
      <th>DOB</th>
      <th>Gender</th>
      <th>Hobbies</th>
    </tr>
  `;

  for (let data of formDataArray) {
    tableHTML += `
      <tr>
        <td>${data.name}</td>
        <td>${data.email}</td>
        <td>${data.dob}</td>
        <td>${data.gender}</td>
        <td>${data.hobbies}</td>
      </tr>
    `;
  }

  tableHTML += `</table>
  <br>
  <button onclick="downloadCSV()">Download CSV</button>
  <button onclick="copyTable()">Copy to Clipboard</button>`;

  document.getElementById("output").innerHTML = tableHTML;
}

function downloadCSV() {

  let csv = "Name,Email,DOB,Gender,Hobbies\n";

  for (let data of formDataArray) {
    csv += `${data.name},${data.email},${data.dob},${data.gender},${data.hobbies}\n`;
  }

  let blob = new Blob([csv], { type: "text/csv" });
  let url = URL.createObjectURL(blob);

  let a = document.createElement("a");
  a.href = url;
  a.download = "formData.csv";
  a.click();

  URL.revokeObjectURL(url);
}

function copyTable() {

  let text = "Name\tEmail\tDOB\tGender\tHobbies\n";

  for (let data of formDataArray) {
    text += `${data.name}\t${data.email}\t${data.dob}\t${data.gender}\t${data.hobbies}\n`;
  }

  navigator.clipboard.writeText(text)
    .then(() => alert("Copied to clipboard!"));
}
</script>
